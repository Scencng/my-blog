local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "src/contents/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "published", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "分类", name: "category", widget: "string", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "作者", name: "author", widget: "string", required: false }
      - { label: "许可证", name: "licenseName", widget: "string", required: false }
      - { label: "原文链接", name: "sourceLink", widget: "string", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }
